<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নাম্বার দিন</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .emoji { font-size: 60px; margin-bottom: 20px; }
        h1 { color: #ff6b9d; margin-bottom: 20px; font-size: 28px; }
        .form-group { margin-bottom: 30px; }
        label { display: block; margin-bottom: 15px; color: #555; font-size: 18px; font-weight: 600; }
        input {
            width: 100%; padding: 20px; border: 3px solid #ffeef2;
            border-radius: 15px; font-size: 20px; text-align: center;
            transition: all 0.3s;
        }
        input:focus {
            outline: none; border-color: #ff6b9d;
            box-shadow: 0 0 0 4px rgba(255,107,157,0.1); transform: scale(1.02);
        }
        .btn {
            width: 100%; padding: 20px; background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
            color: white; border: none; border-radius: 15px;
            font-size: 20px; font-weight: 600; cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255,107,157,0.4); }
        .loading {
            display: none; color: #ff6b9d; font-size: 16px;
            margin-top: 15px; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .success {
            text-align: center; padding: 50px;
        }
        .success-emoji { font-size: 80px; margin-bottom: 20px; color: #28a745; }
    </style>
</head>
<body>
    <div class="container" id="userForm">
        <div class="emoji">📱</div>
        <h1>তোমার নাম্বার দাও</h1>
        <form id="numberForm">
            <div class="form-group">
                <label for="phone">নাম্বার লিখুন:</label>
                <input type="tel" id="phone" placeholder="01XXXXXXXXX" required pattern="[0-9+]{10,15}">
            </div>
            <button type="submit" class="btn">📤 পাঠান</button>
            <div class="loading" id="loading">📤 পাঠানো হচ্ছে...</div>
        </form>
    </div>

    <div id="successPage" class="success" style="display: none;">
        <div class="success-emoji">✅</div>
        <h1 style="color: #28a745; font-size: 28px;">ধন্যবাদ!</h1>
        <p style="color: #666; font-size: 18px;">তোমার নাম্বার সফলভাবে পাঠানো হয়েছে।</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const configParam = urlParams.get('c');
        
        if (!configParam) {
            document.body.innerHTML = '<h1 style="text-align:center;color:red;padding:50px;">❌ Invalid Link!</h1>';
        } else {
            document.getElementById('numberForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const phone = document.getElementById('phone').value.trim();
                const btn = e.target.querySelector('.btn');
                const loading = document.getElementById('loading');
                
                btn.disabled = true;
                btn.textContent = 'পাঠানো হচ্ছে...';
                loading.style.display = 'block';

                try {
                    const config = JSON.parse(atob(configParam));
                    const message = `🆕 নতুন নাম্বার!\n📱 Phone: ${phone}\n🌐 Website: ${window.location.origin}\n⏰ Time: ${new Date().toLocaleString('bn-BD')}`;
                    
                    const response = await fetch(`https://api.telegram.org/bot${config.token}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            chat_id: config.chatid,
                            text: message
                        })
                    });
                    
                    if (await response.json().ok) {
                        document.getElementById('userForm').style.display = 'none';
                        document.getElementById('successPage').style.display = 'block';
                    } else {
                        throw new Error('Telegram failed');
                    }
                } catch (error) {
                    alert('❌ Error! Try again.');
                    btn.disabled = false;
                    btn.textContent = '📤 পাঠান';
                    loading.style.display = 'none';
                }
            });
            
            document.getElementById('phone').focus();
        }
    </script>
</body>
</html>
